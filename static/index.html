<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 销售训练 Chatbot</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Top Status Bar -->
        <header class="top-status-bar">
            <div class="topbar-session-info" id="topbarSessionInfo">
                <span class="no-session">暂无活动会话</span>
            </div>

            <div class="topbar-actions">
                <button class="btn btn-sm btn-primary" id="btnNewChat">
                    <i data-lucide="plus"></i>
                    <span>新建</span>
                </button>
                <button class="btn btn-sm btn-secondary" id="btnDeleteSession" disabled>
                    <i data-lucide="x"></i>
                    <span>结束</span>
                </button>

                <div class="drawer-trigger" id="drawerTrigger">
                    <i data-lucide="messages-square"></i>
                    <span class="drawer-badge" id="drawerBadge">0</span>
                    <span class="drawer-hint">会话历史</span>
                </div>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-logo">AI</div>
                <div class="brand-title">
                    <h1>销售训练</h1>
                    <p>智能对话系统</p>
                </div>
            </div>

            <div class="customer-profile">
                <div class="profile-header">
                    <div class="profile-avatar">张</div>
                    <div class="profile-info">
                        <h3>张主任</h3>
                        <p>内分泌科主任</p>
                    </div>
                </div>
                <div class="profile-details">
                    <div class="detail-item">
                        <i data-lucide="target" class="detail-icon"></i>
                        <span>糖尿病控制率</span>
                    </div>
                    <div class="detail-item">
                        <i data-lucide="shield-check" class="detail-icon"></i>
                        <span>药物安全性</span>
                    </div>
                    <div class="detail-item">
                        <i data-lucide="file-text" class="detail-icon"></i>
                        <span>注重循证医学证据</span>
                    </div>
                </div>
            </div>

            <div class="coverage-section">
                <div class="section-title">
                    <i data-lucide="check-circle-2"></i>
                    <span>语义点覆盖</span>
                </div>
                <div class="coverage-items" id="coverageItems">
                    <div class="coverage-item not-covered">
                        <div class="item-info">
                            <h4>HbA1c 改善</h4>
                            <p>提及降低糖化血红蛋白效果</p>
                        </div>
                        <div class="item-status not-covered"></div>
                    </div>
                    <div class="coverage-item not-covered">
                        <div class="item-info">
                            <h4>低血糖风险</h4>
                            <p>提及低血糖风险低</p>
                        </div>
                        <div class="item-status not-covered"></div>
                    </div>
                    <div class="coverage-item not-covered">
                        <div class="item-info">
                            <h4>用药便利性</h4>
                            <p>提及一周一次给药</p>
                        </div>
                        <div class="item-status not-covered"></div>
                    </div>
                </div>
                
                <div class="progress-container">
                    <div class="progress-header">
                        <span class="progress-label">总体覆盖</span>
                        <span class="progress-value" id="progressValue">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main content -->
        <main class="main-content">
            <div class="chat-messages" id="chatMessages">
                <div class="message ai">
                    <div class="message-avatar">AI</div>
                    <div class="message-content">
                        您好！我是您的AI销售训练助手。今天我们将模拟一场与张主任的销售对话。<br><br>
                        张主任是内分泌科主任，关注糖尿病控制率和药物安全性，注重循证医学证据。<br><br>
                        请开始您的销售开场...
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <form class="input-form" id="inputForm">
                    <div class="input-wrapper">
                        <textarea
                            class="chat-input"
                            id="chatInput"
                            placeholder="输入您的销售话术..."
                            rows="1"
                        ></textarea>
                    </div>
                    <button type="submit" class="send-button" id="btnSend" disabled>
                        <i data-lucide="send"></i>
                    </button>
                </form>
            </div>
        </main>

        <!-- Session Drawer (Right Side) -->
        <aside class="session-drawer" id="sessionDrawer">
            <div class="drawer-header">
                <h3>历史会话</h3>
                <button class="drawer-close" onclick="closeDrawer()">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <div class="drawer-content" id="sessionListContainer">
                <p class="empty-list">暂无历史会话</p>
            </div>

            <div class="drawer-footer">
                <button class="btn btn-block btn-secondary" onclick="clearHistory()">
                    <i data-lucide="trash-2"></i>
                    <span>清空历史</span>
                </button>
            </div>
        </aside>
    </div>

    <!-- Toast notifications -->
    <div class="toast" id="toast"></div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
    <script src="/static/app.js"></script>
</body>
</html>
