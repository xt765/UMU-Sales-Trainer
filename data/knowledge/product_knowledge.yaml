# 产品知识问答知识库
# 包含DPP-4抑制剂的产品知识，用于RAG检索

product_knowledge:
  # 作用机制
  - category: 作用机制
    question: "DPP-4抑制剂是如何工作的？"
    answer: |
      DPP-4抑制剂通过抑制二肽基肽酶-4（DPP-4）酶的活性发挥作用。
      DPP-4是一种蛋白酶，会快速降解胰高血糖素样肽-1（GLP-1）和葡萄糖依赖性促胰岛素分泌多肽（GIP）。
      当DPP-4被抑制后，内源性GLP-1和GIP水平升高，从而：
      1）促进葡萄糖依赖性胰岛素分泌（血糖高时才促泌，避免低血糖）；
      2）抑制胰高血糖素分泌；
      3）延缓胃排空，增加饱腹感。
      这种机制使DPP-4抑制剂能有效降低血糖，同时低血糖风险低。
    key_points:
      - 葡萄糖依赖性作用机制
      - 智能降糖，低血糖风险低
      - 不影响体重

  - category: 作用机制
    question: "DPP-4抑制剂与其他降糖药相比有什么特点？"
    answer: |
      DPP-4抑制剂具有独特的"智能"降糖特点：
      1）与磺脲类相比：不刺激胰岛素分泌，低血糖风险低，不增加体重；
      2）与二甲双胍相比：胃肠道耐受性好，不需餐中服用；
      3）与GLP-1受体激动剂相比：口服给药，依从性好，价格更低；
      4）与SGLT-2抑制剂相比：不增加泌尿生殖道感染风险。
      适合人群：老年患者、低血糖风险高的患者、肝肾功能欠佳者、需要简化用药者。

  # 临床证据
  - category: 临床证据
    question: "DPP-4抑制剂的心血管安全性如何？"
    answer: |
      DPP-4抑制剂有充分的心血管结局研究（CVOT）数据：
      1）SAVOR-TIMI 53研究：沙格列汀不增加主要心血管事件风险；
      2）TECOS研究：西格列汀心血管安全性良好；
      3）EXAMINE研究：阿格列汀非劣于安慰剂。
      总体结论：DPP-4抑制剂不增加心血管事件风险，心血管安全性良好。
      特殊说明：某些DPP-4抑制剂在心衰住院方面需关注，SAVOR-TIMI 53显示沙格列汀可能小幅增加心衰住院风险。

  - category: 临床证据
    question: "DPP-4抑制剂的降糖疗效如何？"
    answer: |
      DPP-4抑制剂单药治疗可降低HbA1c约0.5-0.8%：
      1）与二甲双胍联合：HbA1c降幅可达1.5%以上；
      2）与磺脲类联合：优于单药，HbA1c降幅约1.0-1.5%；
      3）与胰岛素联合：可减少胰岛素用量，改善血糖波动。
      达标率：约40-50%的患者可实现HbA1c<7%的目标。
      疗效受基线HbA1c、病程、胰岛功能等因素影响。

  - category: 临床证据
    question: "DPP-4抑制剂对体重有什么影响？"
    answer: |
      DPP-4抑制剂对体重影响中性：
      1）不增加体重，部分患者有轻度体重下降；
      2）平均体重变化约-0.1至-1.0kg；
      3）与磺脲类、胰岛素相比，不会导致体重增加。
      这对于肥胖或超重的2型糖尿病患者是有利的。

  # 使用方法
  - category: 使用方法
    question: "DPP-4抑制剂的常规剂量和用法是什么？"
    answer: |
      以常用DPP-4抑制剂为例：
      1）西格列汀：100mg，每日一次，可与食物同服或不含；
      2）沙格列汀：5mg，每日一次，肝功能受损时慎用；
      3）维格列汀：50mg，每日两次（国内常规剂量）；
      4）阿格列汀：25mg，每日一次；
      5）利格列汀：5mg，每日一次，肝肾功能不全无需调整剂量。
      特殊人群：老年人无需调整剂量；轻中度肾功能不全无需调整（除维格列汀需调整）。

  - category: 使用方法
    question: "DPP-4抑制剂有什么禁忌症和注意事项？"
    answer: |
      禁忌症：
      1）对药物成分过敏者禁用；
      2）1型糖尿病患者禁用（不适用于糖尿病酮症酸中毒）；
      3）既往有胰腺炎病史者慎用。
      注意事项：
      1）与其他降糖药联用时需警惕低血糖风险；
      2）妊娠期和哺乳期妇女缺乏数据，慎用；
      3）儿童和青少年患者安全性和有效性未确立。
      药物相互作用：DPP-4主要经CYP酶代谢，与强效CYP3A4抑制剂联用时可能需要调整剂量。

  - category: 使用方法
    question: "肝肾功能不全的患者可以使用DPP-4抑制剂吗？"
    answer: |
      DPP-4抑制剂在肝肾功能不全患者中的使用有所不同：
      1）利格列汀：轻、中、重度肾功能不全及肝功能受损均无需调整剂量，是肝肾功能欠佳患者的理想选择；
      2）西格列汀：重度肾功能不全需调整剂量（50mg每日一次），中度无需调整；
      3）沙格列汀：轻中度无需调整，肝功能受损者慎用；
      4）维格列汀：中重度肾功能不全需调整剂量，肝功能受损者禁用。
      用药前建议检查肝肾功能。

  # 医保信息
  - category: 医保信息
    question: "DPP-4抑制剂的医保报销政策是什么？"
    answer: |
      DPP-4抑制剂已被纳入国家医保目录：
      1）2023年医保目录：多个DPP-4抑制剂（西格列汀、沙格列汀、维格列汀、阿格列汀、利格列汀等）均在目录内；
      2）报销条件：需有明确的2型糖尿病诊断，且经饮食控制、运动治疗后血糖仍控制不佳；
      3）部分产品有具体限制：如需提供病史等。
      建议：具体报销政策以当地医保局为准，部分地区可能有差异。
      患者获益：医保报销后，患者自付费用大幅降低，提高了药物可及性。

  - category: 医保信息
    question: "DPP-4抑制剂与其他降糖药联合用药的方案推荐？"
    answer: |
      经典联合用药方案：
      1）DPP-4抑制剂+二甲双胍：机制互补，疗效增强，是推荐的起始联合方案；
      2）DPP-4抑制剂+磺脲类：协同促泌，注意低血糖风险；
      3）DPP-4抑制剂+胰岛素：可减少胰岛素用量，改善血糖波动；
      4）DPP-4抑制剂+SGLT-2抑制剂：双重机制，覆盖更广；
      5）固定复方制剂：DPP-4抑制剂+二甲双胍单片复方，简化用药，提高依从性。
      指南推荐：二甲双胍控制不佳时，加用DPP-4抑制剂是合理的二线方案。
