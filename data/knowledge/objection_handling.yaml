# 异议处理策略知识库
# 包含常见的医生异议类型及应答策略，用于RAG检索

objection_strategies:
  # 价格异议处理
  - category: 价格异议
    scenario: "医生认为药物价格偏高"
    objection: "这个药物价格比较高，患者的依从性可能会受影响。"
    analysis: |
      医生关注的是患者的经济负担和长期用药成本。
      需要从药物经济学角度出发，强调性价比。
    response_strategy:
      - 强调药物的降糖效果好，可减少联合用药
      - 提及低血糖风险低，减少急救等额外费用
      - 说明每日一次，减少监测费用
    sample_response: |
      "理解您的顾虑。实际上，从综合治疗成本来看，我们的药物有几个优势：
      1）单药控制不佳时，可以直接联合二甲双胍，无需等待；
      2）低血糖风险低，避免了血糖监测和急救的额外支出；
      3）每天一次口服，依从性好，长期控糖效果更稳定。"

  - category: 价格异议
    scenario: "竞品价格更低"
    objection: "同类的DPP-4抑制剂，某某品牌价格更有优势。"
    analysis: |
      需要突出产品的差异化优势，而非单纯比较价格。
    response_strategy:
      - 强调临床证据的差异
      - 提及患者获益的证据
      - 引导关注长期疗效
    sample_response: |
      "价格确实是重要因素。但在选择降糖药物时，我们还需要考虑：
      1）我们的药物有完整的心血管结局研究数据；
      2）肝肾功能不全患者无需调整剂量；
      3）固定复方制剂可改善依从性。这些对患者长期获益都很重要。"

  # 疗效异议处理
  - category: 疗效异议
    scenario: "DPP-4效果不如GLP-1"
    objection: "DPP-4抑制剂效果不如GLP-1受体激动剂，GLP-1还有减重效果。"
    analysis: |
      这是关于作用机制和疗效强度的异议。
      需要承认GLP-1优势，同时强调DPP-4的独特价值。
    response_strategy:
      - 承认GLP-1在减重和降糖幅度上的优势
      - 强调DPP-4的口服便利性和低血糖优势
      - 指出两者适用人群不同
      - GLP-1需要注射，依从性挑战大
    sample_response: |
      "GLP-1确实在降糖幅度和减重方面有优势，这一点我们不回避。
      但对于：
      1）有减重需求但无法接受注射的患者，DPP-4是理想选择；
      2）老年患者、低血糖风险高的患者，DPP-4更安全；
      3）肝肾功能欠佳的患者，DPP-4无需调整剂量。
      临床实践中，我们是根据患者特点个体化用药。"

  - category: 疗效异议
    scenario: "单药疗效不足"
    objection: "单用DPP-4抑制剂可能达不到目标HbA1c。"
    analysis: |
      需要说明联合治疗策略和DPP-4的联合优势。
    response_strategy:
      - 说明联合治疗的必要性
      - 强调DPP-4与二甲双胍联合的协同作用
      - 介绍达标率数据
    sample_response: |
      "您说得对，很多2型糖尿病患者确实需要联合用药。
      事实上，DPP-4抑制剂的亮点之一就是联合治疗：
      1）与二甲双胍联用有协同作用，HbA1c降幅可达1.5%以上；
      2）固定复方制剂服用方便，提高依从性；
      3）对于新诊断HbA1c>8.5%的患者，可以起始联合治疗。"

  # 安全性异议处理
  - category: 安全性异议
    scenario: "新药临床数据不足"
    objection: "这个药物上市时间不长，临床数据还不够充分。"
    analysis: |
      需要诚实面对，同时强调已有的循证证据和监测体系。
    response_strategy:
      - 承认药物相对新
      - 强调已完成的临床研究和长期随访数据
      - 说明药物警戒体系
    sample_response: |
      "您的谨慎可以理解。实际上，我们这个药物：
      1）已在全球多个国家上市，积累了大量真实世界数据；
      2）有关键的心血管结局试验（CVOT）数据，证明了心血管安全性；
      3）有完善的药物警戒体系，上市后持续监测。
      DPP-4抑制剂类药物整体安全性数据已经很充分。"

  - category: 安全性异议
    scenario: "胰腺安全性担忧"
    objection: "听说DPP-4抑制剂可能有胰腺炎风险？"
    analysis: |
      需要科学回应，同时保持客观。
    response_strategy:
      - 承认这是重要关注点
      - 引用监管部门的安全性评估结论
      - 提供实际发生率的对比数据
    sample_response: |
      "这是很多医生都会关注的问题。根据FDA和EMA的评估：
      1）大型临床试验中，胰腺炎发生率极低（约0.1-0.3%）；
      2）与安慰剂相比没有显著差异；
      3）但我们仍会提醒患者：既往有胰腺炎病史者慎用。
      整体获益大于风险。"

  # 用药便利性异议处理
  - category: 用药便利性异议
    scenario: "每日一次不够方便"
    objection: "有些降糖药一周一次，我们的药物需要每天服用，不够方便。"
    analysis: |
      DPP-4抑制剂本身已属便利性较高的口服药，但可与GLP-1对比强调口服优势。
    response_strategy:
      - 强调口服vs注射的便利性差异
      - 说明固定复方制剂的优势
      - 提及价格和可及性优势
    sample_response: |
      "相比注射制剂，我们的药物是口服给药：
      1）无需注射，患者接受度高，尤其适合对针头恐惧的患者；
      2）不受饮食影响，餐前餐后均可服用；
      3）固定复方制剂一片即可，简化用药方案；
      4）价格可及性更好，长期使用负担更轻。"

  - category: 用药便利性异议
    scenario: "用药方案复杂"
    objection: "联合用药时种类太多，患者容易漏服。"
    analysis: |
      可推荐固定复方制剂解决此问题。
    response_strategy:
      - 推荐固定复方制剂
      - 强调简化方案的依从性优势
      - 提供具体产品选择
    sample_response: |
      "您说得非常对，用药简化对依从性至关重要。
      我们有DPP-4抑制剂+二甲双胍的固定复方制剂：
      1）一片药包含两种成分，减少漏服；
      2）HbA1c降幅优于单药联合；
      3）价格比两种药物分开购买更经济。
      这对需要联合用药的患者是理想选择。"
