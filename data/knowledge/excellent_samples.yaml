# 优秀话术示例知识库
# 包含销售对话各环节的优秀话术示例，用于RAG检索

excellent_samples:
  # 开场白
  - category: 开场白
    scenario: "初次拜访"
    title: "专业简洁的开场白"
    sample_dialogue: |
      医药代表："王主任您好，我是某某公司的学术代表小李，专注于糖尿病领域。
      打扰您几分钟，想和您分享一些DPP-4抑制剂的最新临床进展。
      请问您现在接诊的2型糖尿病患者中，用DPP-4抑制剂的多吗？"
      医生："还行，但最近用得少了。"
      医药代表："理解，GLP-1最近确实比较火。其实对于一些特殊人群，
      比如老年患者、合并肾功能欠佳的患者，DPP-4抑制剂有独特的优势。方便的话，
      我可以简单介绍一下？"
    key_points:
      - 自我介绍清晰
      - 先以开放式问题了解医生观点
      - 找到切入角度后再展开

  - category: 开场白
    scenario: "学术会议后跟进"
    title: "利用学术会议契机"
    sample_dialogue: |
      医药代表："李教授好，上周内分泌年会上，您主持了糖尿病管理专场，
      讲到个体化治疗时提到了DPP-4抑制剂在特殊人群中的应用。
      会后有些老师也在讨论，正好有几个问题想请教您。"
    key_points:
      - 提及会议背景，展现专业度
      - 以请教姿态切入，不显得推销
      - 自然引出产品话题

  # 产品介绍
  - category: 产品介绍
    scenario: "介绍作用机制"
    title: "用比喻让机制易懂"
    sample_dialogue: |
      医药代表："您知道GLP-1是咱们肠道分泌的'智能降糖素'，血糖高时才促泌，
      血糖正常时不工作。但DPP-4这个酶像一把剪刀，会把它剪掉。
      我们DPP-4抑制剂就是把剪刀封印住，让GLP-1多发挥作用。"
      医生："有意思，那低血糖风险应该比较低。"
      医药代表："您说得对！这正是DPP-4的独特优势——葡萄糖依赖性，
      相当于给血糖装了个'智能开关'。"
    key_points:
      - 用比喻让专业机制通俗易懂
      - 引导医生自己得出结论
      - 强调核心优势（低血糖风险低）

  - category: 产品介绍
    scenario: "介绍临床证据"
    title: "数据驱动的介绍"
    sample_dialogue: |
      医药代表："主任，我们药物有完整的心血管结局研究（CVOT）数据，
      纳入14000多例患者，中位随访3年，结果显示：
      1）主要心血管事件发生率与安慰剂相当（HR=0.98）；
      2）低血糖事件显著低于磺脲类组；
      3）不增加心衰住院风险。"
      医生："那对老年患者呢？"
      医药代表："研究亚组分析显示，≥65岁老年亚组疗效和安全性一致，
      而且肝肾功能不全患者也无需调整剂量。"
    key_points:
      - 引用具体数据增强可信度
      - 主动提及医生关心的亚组人群
      - 数据呈现有条理

  # 异议处理
  - category: 异议处理
    scenario: "应对价格异议"
    title: "从药物经济学角度回应"
    sample_dialogue: |
      医生："药是不错，但价格确实高了点。"
      医药代表："您的顾虑很实际。我帮您算一笔账：
      1）这个药物降糖效果好，可能减少联合用药种类；
      2）低血糖风险低，减少了血糖监测和急救费用；
      3）肝肾功能不全无需调整剂量，减少了定期监测的费用。
      综合来看，每月实际增加的花费可能没有想象中那么多。
      而且现在医保也能报销了。"
    key_points:
      - 不回避价格问题
      - 主动算账，展示综合成本思维
      - 提及医保降低实际负担

  - category: 异议处理
    scenario: "应对疗效异议"
    title: "强调差异化定位"
    sample_dialogue: |
      医生："GLP-1降糖效果更强，还有减重作用。"
      医药代表："GLP-1确实在降糖幅度和减重上有优势，
      DPP-4不与之竞争这部分市场。但对于：
      1）有减重需求但拒绝注射的患者——口服DPP-4是桥梁；
      2）老年患者、低血糖高风险患者——DPP-4更安全；
      3）合并肾功能不全的患者——DPP-4无需调量更方便。
      它们是互补关系，不是替代关系。"
    key_points:
      - 承认竞品优势，避免贬低
      - 明确DPP-4的差异化适用人群
      - 建立互补而非竞争关系

  - category: 异议处理
    scenario: "应对安全性异议"
    title: "用指南和监管结论说话"
    sample_dialogue: |
      医生："DPP-4对胰腺安全性到底怎么样？"
      医药代表："这是重要问题。FDA和EMA在评估了所有数据后，
      目前的结论是：
      1）大型临床试验中胰腺炎发生率极低（0.1-0.3%）；
      2）与安慰剂组无统计学差异；
      3）因果关系未确立。
      我们也会在说明书中提醒：有胰腺炎病史者慎用。
      整体而言，获益大于风险。"
    key_points:
      - 引用权威机构结论
      - 客观呈现数据，不夸大
      - 诚实提及注意事项

  # 成交话术
  - category: 成交话术
    scenario: "尝试达成处方承诺"
    title: "自然收尾，寻求承诺"
    sample_dialogue: |
      医药代表："今天非常感谢您的宝贵时间。总结一下，
      DPP-4抑制剂的核心优势是：
      1）葡萄糖依赖性降糖，低血糖风险低；
      2）口服便利，一天一次；
      3）肝肾功能不全患者无需调整剂量。
      主任，下次遇到需要简化用药方案的患者，您可以考虑试用一下。
      这是我的联系方式，有任何问题随时沟通。
      下次拜访时，能否请您分享一下用药体验？"
    key_points:
      - 清晰总结核心卖点
      - 给出具体的使用场景建议
      - 请求下一步跟进的机会

  - category: 成交话术
    scenario: "会后跟进"
    title: "学术会议后的高效跟进"
    sample_dialogue: |
      医药代表："王教授，昨天会上您提到对DPP-4抑制剂在老年患者中的应用很感兴趣。
      我整理了一份老年糖尿病患者的用药指南更新要点，
      其中特别提到了DPP-4抑制剂的适用人群。
      您看是发到您的邮箱，还是下次拜访时当面给您讲解？"
      医生："发邮箱吧，邮箱是***。"
      医药代表："好的，我今天就发。另外，科室其他老师需要的话，
      我也可以多准备几份。"
    key_points:
      - 利用已有兴趣点切入
      - 提供有价值的后续服务
      - 创造多次拜访机会

  - category: 成交话术
    scenario: "处理竞品替换机会"
    title: "发现竞品替换机会时的沟通"
    sample_dialogue: |
      医药代表："张主任，我注意到您现在处方某品牌DPP-4比较多。
      我们产品和他相比，有一个特点：肝肾功能不全患者完全无需调整剂量。
      您现在管理的患者中，有没有肝功能欠佳的？"
      医生："还真有几个。"
      医药代表："那下次遇到这类患者时，可以考虑试用我们的药物。
      我可以提供一些相关的临床病例资料。
      您看方便留个联系方式，我给您寄送资料吗？"
    key_points:
      - 避免直接贬低竞品
      - 找到自身差异化优势
      - 给出具体使用场景
      - 自然过渡到下一步行动
